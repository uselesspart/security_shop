{% extends 'base.html' %}

{% block title %}Delete {{ product.name }} - Security Shop{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-danger">
                <div class="card-body">
                    <h1 class="h4 card-title">Delete product</h1>
                    <p>Are you sure you want to delete <strong>{{ product.name }}</strong>? This cannot be undone.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Delete</button>
                            <a href="{% url 'moderator_product_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
